- defaults:
    link:
      relink: true

- clean: ['~', '~/.vim', '~/.config']

- link:
    ~/.vimrc: vimrc
    ~/.bashrc: bashrc
    ~/.config/redshift.conf: redshift.conf
    ~/.config/alacritty/alacritty.yml: alacritty.yml
    ~/.tmux.conf: tmux.conf

- create:
    - ~/.vim

- shell:
  - [git submodule update --init --recursive, Installing submodules]
