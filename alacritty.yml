colors:
  primary:
    background: '#1C1B19'
    foreground: '#D0BFA1'

  cursor:
    text:   '#D0BFA1'
    cursor: '#D0BFA1'

  normal:
    black:   '#1C1B19'
    red:     '#EF2F27'
    green:   '#519F50'
    yellow:  '#FBB829'
    blue:    '#2C78BF'
    magenta: '#E02C6D'
    cyan:    '#0AAEB3'
    white:   '#D0BFA1'

  bright:
    black:   '#918175'
    red:     '#F75341'
    green:   '#98BC37'
    yellow:  '#FED06E'
    blue:    '#68A8E4'
    magenta: '#FF5C8F'
    cyan:    '#53FDE9'
    white:   '#FCE8C3'

font:
  size: 8
  normal:
    family: Dejavu Sans Mono
    style: Regular

  bold:
    family: Dejavu Sans Mono

  italic:
    family: Dejavu Sans Mono

key_bindings:
    # Control + 0 will reset font size by default
  - { key: Key4, mods: Control, action: IncreaseFontSize }
  - { key: Minus, mods: Control, action: DecreaseFontSize  }
