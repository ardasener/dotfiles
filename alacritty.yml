env:
  TERM: xterm-256color

colors:
  primary:
    background: "0x2b2d3a"
    foreground: "0xe1e3e4"

  normal:
    black: "0x181a1c"
    red: "0xfb617e"
    green: "0x9ed06c"
    yellow: "0xedc763"
    blue: "0x6dcae8"
    magenta: "0xbb97ee"
    cyan: "0xf89860"
    white: "0xe1e3e4"

  bright:
    black: "0x181a1c"
    red: "0xfb617e"
    green: "0x9ed06c"
    yellow: "0xedc763"
    blue: "0x6dcae8"
    magenta: "0xbb97ee"
    cyan: "0xf89860"
    white: "0xe1e3e4"

font:
  size: 14
  normal:
    family: Dejavu Sans Mono
    style: Regular

  bold:
    family: Dejavu Sans Mono

  italic:
    family: Dejavu Sans Mono

key_bindings:
    # Control + 0 will reset font size by default
  - { key: Key4, mods: Control, action: IncreaseFontSize }
  - { key: Minus, mods: Control, action: DecreaseFontSize  }
